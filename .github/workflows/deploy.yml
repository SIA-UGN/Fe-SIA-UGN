name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fe-sia-ugn:latest
            ${{ secrets.DOCKER_USERNAME }}/fe-sia-ugn:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/apps/myapp

            if [ ! -d .git ]; then
              echo "Repository not found in ~/apps/myapp"
              exit 1
            fi

            git pull origin main

            if [ -f .env ]; then
              grep -v '^NEXTJS_IMAGE=' .env > .env.tmp || true
              echo "NEXTJS_IMAGE=${{ secrets.DOCKER_USERNAME }}/fe-sia-ugn:latest" >> .env.tmp
              mv .env.tmp .env
            else
              echo "NEXTJS_IMAGE=${{ secrets.DOCKER_USERNAME }}/fe-sia-ugn:latest" > .env
            fi

            docker compose pull nextjs
            docker compose up -d --remove-orphans
            docker image prune -af
